<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Things I Love Doing</title>
<style>
body{
  margin:0;
  font-family:"Comic Sans MS", cursive;
  background:linear-gradient(120deg,#111,#2b2b2b);
  color:white;
}

header{
  text-align:center;
  padding:20px;
  font-size:1.6rem;
  letter-spacing:2px;
}

.container{
  padding:15px;
}

.inputBox{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:20px;
}

input,button{
  padding:12px;
  border-radius:12px;
  border:none;
  font-size:1rem;
}

input{
  background:#222;
  color:white;
}

button{
  background:linear-gradient(45deg,#ff00cc,#00f7ff);
  color:black;
  font-weight:bold;
}

ul{
  list-style:none;
  padding:0;
}

.task{
  background:#1e1e1e;
  border:2px dashed #aaa;
  margin-bottom:12px;
  padding:12px;
  border-radius:15px;
  display:flex;
  flex-direction:column;
}

.taskTop{
  display:flex;
  align-items:center;
  gap:10px;
}

.icon{
  font-size:1.8rem;
  cursor:pointer;
}

.filePreview{
  margin-top:8px;
}

.filePreview img, video{
  width:100%;
  border-radius:10px;
  margin-top:5px;
}

.audioBox{
  width:100%;
}

</style>
</head>
<body>

<header>🌸 Things I Love Doing 🌸</header>

<div class="container">

<div class="inputBox">
<input id="taskInput" placeholder="Add something you love doing...">
<input type="file" id="fileInput">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>
function addTask(){

const text=document.getElementById("taskInput").value
const file=document.getElementById("fileInput").files[0]

if(text==="") return

const li=document.createElement("li")
li.className="task"

const top=document.createElement("div")
top.className="taskTop"

const icon=document.createElement("span")
icon.className="icon"
icon.textContent="🌱"

icon.onclick=()=>{
  if(icon.textContent==="🌱"){
    icon.textContent="🌸"
  }else{
    icon.textContent="🌱"
  }
}

const label=document.createElement("span")
label.textContent=text


top.appendChild(icon)
top.appendChild(label)

li.appendChild(top)

if(file){

const preview=document.createElement("div")
preview.className="filePreview"

const url=URL.createObjectURL(file)

if(file.type.startsWith("image")){
const img=document.createElement("img")
img.src=url
preview.appendChild(img)
}

else if(file.type.startsWith("video")){
const vid=document.createElement("video")
vid.src=url
vid.controls=true
preview.appendChild(vid)
}

else if(file.type.startsWith("audio")){
const aud=document.createElement("audio")
aud.src=url
aud.controls=true
preview.appendChild(aud)
}

li.appendChild(preview)
}


document.getElementById("taskList").appendChild(li)


document.getElementById("taskInput").value=""
document.getElementById("fileInput").value=""

}
</script>

</body>
</html>
